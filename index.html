<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/style/style.css?q=7">
</head>

<body>
    <div class="main">
        <form class="myForm">
            <div class="header">
                <h2>Quadratic Equation Calculator</h2>
            </div>

            <fieldset class="inputs">
                <legend>ax<sup>2</sup> + bx + c = 0</legend>
                <input type="number" name="a" id="a" placeholder="a" class="inpt">
                <p style="font-weight: 100;">X<sup>2</sup></p>
                <h1 class="plus" style="font-weight: 900;">+</h1>
                <input type="number" name="b" id="b" placeholder="b" class="inpt">
                <p style="font-weight: 100;">X</p>
                <h1 class="plus" style="font-weight: 900;">+</h1>
                <input type="number" name="b" id="c" placeholder="c" class="inpt">
                <h1 class="plus">=</h1>
                <h2 class="zero">0</h2>
            </fieldset>
            <div class="buttons">
                <button class="clear" type="reset">Clear</button>
                <button class="submit">Get Result</button>
            </div>
            <fieldset class="resultDiv">
                <legend>Equation Results</legend>
                <div>
                    <label for="result1">Result1</label>
                    <input type="text" name="" id="result1" readonly>
                </div>
                <div>
                    <label for="result2">Result2</label>
                    <input type="text" name="" id="result2" readonly>
                </div>

            </fieldset>

        </form>
    </div>
    <div id="prevent"></div>
    <script src="style/index.js?q=9"></script>
</body>

</html>
